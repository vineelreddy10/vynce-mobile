<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vynce — It's a Match!</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:Inter,sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:20px;color:#1a1c2e}}
.phone{{width:390px;max-width:100%;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.15);position:relative}}
h1,h2,h3{{font-family:Montserrat,sans-serif}}
.btn{{display:block;width:calc(100% - 40px);margin:0 20px;padding:16px;background:linear-gradient(135deg,#ff5f6d,#ff8a6d);color:#fff;border:none;border-radius:999px;font-family:Montserrat;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,109,.25);text-align:center;text-decoration:none}}
.p20{{padding:20px}}
.mb16{{margin-bottom:16px}}
.flex{{display:flex;align-items:center;gap:8px}}
.between{{justify-content:space-between}}
.center{{justify-content:center}}
.wrap{{flex-wrap:wrap}}
.tag{{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:#f1f3f5;color:#64748b}}
.input{{width:100%;padding:12px 16px;border:1.5px solid #e1e3e4;border-radius:16px;font-family:Inter;font-size:15px;outline:none;background:#fff}}
.input:focus{{border-color:#ff5f6d;box-shadow:0 0 0 3px rgba(255,95,109,.12)}}
label{{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}}
</style></head><body>
<div class="phone">

<div style="height:100vh;background:linear-gradient(135deg,#ff5f6d,#ff8a6d,#fbbf24);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;position:relative;overflow:hidden">
<div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(255,255,255,.2) 0%,transparent 60%)"></div>
<div style="position:absolute;top:80px;font-size:60px;opacity:.15">❤️</div>
<div style="position:absolute;bottom:120px;right:40px;font-size:40px;opacity:.12">⭐</div>
<div style="position:absolute;top:200px;left:30px;font-size:30px;opacity:.1">✨</div>
<div style="display:flex;gap:-12px;margin-bottom:24px;position:relative;z-index:2">
<div style="width:100px;height:100px;border-radius:50%;border:3px solid #fff;background-image:url('https://picsum.photos/200/200?1');background-size:cover;background-position:center;box-shadow:0 8px 24px rgba(0,0,0,.15);margin-right:-15px"></div>
<div style="width:100px;height:100px;border-radius:50%;border:3px solid #fff;background-image:url('https://picsum.photos/200/200?2');background-size:cover;background-position:center;box-shadow:0 8px 24px rgba(0,0,0,.15)"></div>
</div>
<h1 style="font-size:36px;font-weight:700;color:#fff;margin-bottom:8px;position:relative;z-index:2">It's a Match!</h1>
<p style="color:rgba(255,255,255,.85);font-size:16px;margin-bottom:40px;position:relative;z-index:2">You and Sarah liked each other</p>
<div style="position:relative;z-index:2;width:100%;display:flex;flex-direction:column;gap:12px">
<div class="btn" style="background:#fff;color:#ff5f6d;box-shadow:0 4px 12px rgba(0,0,0,.1);margin:0">Send a Message</div>
<div class="btn" style="background:transparent;color:#fff;border:2px solid rgba(255,255,255,.5);box-shadow:none;margin:0">Keep Swiping</div>
</div>
</div>

</div></body></html>
