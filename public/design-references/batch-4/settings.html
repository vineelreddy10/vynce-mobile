<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vynce — Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:Inter,sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:20px;color:#1a1c2e}}
.phone{{width:390px;max-width:100%;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.15);position:relative}}
h1,h2,h3{{font-family:Montserrat,sans-serif}}
.btn{{display:block;width:calc(100% - 40px);margin:0 20px;padding:16px;background:linear-gradient(135deg,#ff5f6d,#ff8a6d);color:#fff;border:none;border-radius:999px;font-family:Montserrat;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,109,.25);text-align:center;text-decoration:none}}
.p20{{padding:20px}}
.mb16{{margin-bottom:16px}}
.flex{{display:flex;align-items:center;gap:8px}}
.between{{justify-content:space-between}}
.center{{justify-content:center}}
.wrap{{flex-wrap:wrap}}
.tag{{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:#f1f3f5;color:#64748b}}
.input{{width:100%;padding:12px 16px;border:1.5px solid #e1e3e4;border-radius:16px;font-family:Inter;font-size:15px;outline:none;background:#fff}}
.input:focus{{border-color:#ff5f6d;box-shadow:0 0 0 3px rgba(255,95,109,.12)}}
label{{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}}
</style></head><body>
<div class="phone">

<div class="p20" style="border-bottom:1px solid #f1f5f9"><h2 style="font-size:20px;font-weight:600">Settings</h2></div>
<div class="p20" style="font-size:14px">
<div style="margin-bottom:20px"><h3 style="font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Account</h3>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Email</span><span style="color:#64748b">alex@example.com →</span></div>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Password</span><span style="color:#64748b">••••••••• →</span></div>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span style="color:#ef4444">Delete Account</span><span style="color:#64748b">→</span></div>
</div>
<div style="margin-bottom:20px"><h3 style="font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Privacy</h3>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Show online status</span><label style="width:44px;height:24px;background:#ff5f6d;border-radius:12px;position:relative;cursor:pointer"><div style="width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px"></div></label></div>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Show distance</span><label style="width:44px;height:24px;background:#e1e3e4;border-radius:12px;position:relative;cursor:pointer"><div style="width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px"></div></label></div>
</div>
<div style="margin-bottom:20px"><h3 style="font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Discovery</h3>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Age range</span><span style="color:#64748b">22 - 40 →</span></div>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Max distance</span><span style="color:#64748b">50 km →</span></div>
</div>
<div style="margin-bottom:20px"><h3 style="font-size:13px;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px">Support</h3>
<div class="flex between" style="padding:12px 0;border-bottom:1px solid #f1f5f9"><span>Blocked users</span><span style="color:#64748b">→</span></div>
<div class="flex between" style="padding:12px 0;"><span>Report a problem</span><span style="color:#64748b">→</span></div>
</div>
</div>

</div></body></html>
