<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vynce — Edit Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:Inter,sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:20px;color:#1a1c2e}}
.phone{{width:390px;max-width:100%;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.15);position:relative}}
h1,h2,h3{{font-family:Montserrat,sans-serif}}
.btn{{display:block;width:calc(100% - 40px);margin:0 20px;padding:16px;background:linear-gradient(135deg,#ff5f6d,#ff8a6d);color:#fff;border:none;border-radius:999px;font-family:Montserrat;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,109,.25);text-align:center;text-decoration:none}}
.p20{{padding:20px}}
.mb16{{margin-bottom:16px}}
.flex{{display:flex;align-items:center;gap:8px}}
.between{{justify-content:space-between}}
.center{{justify-content:center}}
.wrap{{flex-wrap:wrap}}
.tag{{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:#f1f3f5;color:#64748b}}
.input{{width:100%;padding:12px 16px;border:1.5px solid #e1e3e4;border-radius:16px;font-family:Inter;font-size:15px;outline:none;background:#fff}}
.input:focus{{border-color:#ff5f6d;box-shadow:0 0 0 3px rgba(255,95,109,.12)}}
label{{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}}
</style></head><body>
<div class="phone">

<div class="p20 flex between" style="border-bottom:1px solid #f1f5f9">
<h2 style="font-size:20px;font-weight:600">Edit Profile</h2>
<span style="color:#ff5f6d;font-weight:600;font-size:14px;cursor:pointer">Save</span>
</div>
<div class="p20">
<div class="flex center" style="margin-bottom:20px">
<div style="width:88px;height:88px;border-radius:50%;background-image:url('https://picsum.photos/200/200?1');background-size:cover;background-position:center;position:relative;cursor:pointer">
<div style="position:absolute;bottom:0;right:0;width:28px;height:28px;border-radius:50%;background:#ff5f6d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #fff">📷</div>
</div>
</div>
<div class="mb16"><label>Display Name</label><input class="input" value="Alex"></div>
<div class="mb16"><label>Bio</label><textarea class="input" rows="3" style="resize:none;font-family:Inter">Adventure seeker | Coffee enthusiast | Dog parent 🐕</textarea><div style="text-align:right;font-size:11px;color:#94a3b8;margin-top:4px">47 / 150</div></div>
<div class="mb16"><label>Interests</label>
<div class="flex wrap" style="gap:6px;margin-top:6px">
<span class="tag active">Hiking</span><span class="tag active">Photography</span><span class="tag active">Coffee</span><span class="tag" style="border:1.5px dashed #e1e3e4;background:transparent">+ Add</span>
</div></div>
<div class="mb16"><label>Location</label><input class="input" value="Portland, OR"></div>
<div class="mb16"><label>Job</label><input class="input" value="Product Designer"></div>
<div class="mb16"><label>Education</label><input class="input" value="Portland State University"></div>
</div>

</div></body></html>
