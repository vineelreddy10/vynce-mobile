<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vynce — Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:20px}
.phone{width:390px;max-width:100%;background:#f8f9fa;border-radius:40px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.15)}
.hero{background:linear-gradient(135deg,#ff5f6d,#ff8a6d);padding:60px 24px 50px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08)}
.hero::after{content:'';position:absolute;bottom:-60px;left:-30px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.05)}
.hero h1{font-family:Montserrat,sans-serif;font-weight:700;font-size:32px;color:#fff;position:relative;z-index:1}
.hero p{font-family:Inter;font-size:14px;color:rgba(255,255,255,.7);margin-top:6px;position:relative;z-index:1}
.card{margin:-24px 20px 0;background:#fff;border-radius:16px;padding:24px 20px;position:relative;z-index:2;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.card h2{font-family:Montserrat;font-size:20px;font-weight:600;color:#1a1c2e;margin-bottom:20px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}
.fg input{width:100%;padding:12px 16px;border:1.5px solid #e1e3e4;border-radius:16px;font-family:Inter;font-size:15px;color:#1a1c2e;outline:none;background:#fff}
.fg input:focus{border-color:#ff5f6d;box-shadow:0 0 0 3px rgba(255,95,109,.12)}
.gender{display:flex;gap:8px;margin-top:4px}
.gender div{flex:1;padding:10px;border:1.5px solid #e1e3e4;border-radius:999px;text-align:center;font-size:14px;font-weight:500;color:#64748b;background:#fff;cursor:pointer}
.gender div.active{border-color:#ff5f6d;background:#fff5f5;color:#ff5f6d}
.btn{width:100%;padding:16px;margin-top:8px;background:linear-gradient(135deg,#ff5f6d,#ff8a6d);color:#fff;border:none;border-radius:999px;font-family:Montserrat;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,109,.25)}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#94a3b8;font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e1e3e4}
.social{display:flex;gap:12px;justify-content:center;margin-bottom:10px}
.social div{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.social .apple{background:#1a1c2e;color:#fff}
.social .google{background:#fff;border:1px solid #e1e3e4;color:#1a1c2e}
.link{text-align:center;padding:20px;font-size:13px;color:#64748b}
.link a{color:#ff5f6d;text-decoration:none;font-weight:600}
</style></head><body>
<div class="phone">
<div class="hero"><h1>Join Vynce</h1><p>Find your electric connection</p></div>
<div class="card">
<h2>Create Account</h2>
<div class="fg"><label>Email</label><input type="email" placeholder="Your email" value="alex@example.com"></div>
<div class="fg"><label>Password</label><input type="password" placeholder="Create a password" value="••••••••"></div>
<div class="fg"><label>Display Name</label><input type="text" placeholder="Your name" value="Alex"></div>
<div class="fg"><label>Date of Birth</label><input type="date" value="1998-06-15"></div>
<div class="fg"><label>I am</label><div class="gender"><div class="active">M</div><div>F</div><div>NB/PNS</div></div></div>
<button class="btn">Continue</button>
<div class="divider">or</div>
<div class="social"><div class="apple">🍎</div><div class="google">G</div></div>
</div>
<div class="link">Already have an account? <a href="#">Log in</a></div>
</div></body></html>
