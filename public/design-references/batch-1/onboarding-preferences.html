<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vynce — Preferences</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{{margin:0;padding:0;box-sizing:border-box}}
body{{font-family:Inter,sans-serif;background:#f8f9fa;display:flex;justify-content:center;padding:20px;color:#1a1c2e}}
.phone{{width:390px;max-width:100%;background:#fff;border-radius:40px;overflow:hidden;box-shadow:0 25px 60px rgba(0,0,0,.15)}}
h1,h2,h3{{font-family:Montserrat,sans-serif}}
.btn{{display:block;width:calc(100% - 40px);margin:0 20px;padding:16px;background:linear-gradient(135deg,#ff5f6d,#ff8a6d);color:#fff;border:none;border-radius:999px;font-family:Montserrat;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 8px 20px rgba(255,95,109,.25);text-align:center}}
.btn-outline{{background:transparent;border:2px solid #ff5f6d;color:#ff5f6d;box-shadow:none}}
.p20{{padding:20px}}
.mb16{{margin-bottom:16px}}
.mt16{{margin-top:16px}}
.flex{{display:flex;align-items:center;gap:8px}}
.gap4{{gap:4px}}
.between{{justify-content:space-between}}
.center{{justify-content:center}}
.tag{{display:inline-block;padding:6px 14px;border-radius:999px;font-size:13px;font-weight:500;background:#f1f3f5;color:#64748b;cursor:pointer;transition:all.2s}}
.tag.active{{background:#ff5f6d;color:#fff}}
.input{{width:100%;padding:12px 16px;border:1.5px solid #e1e3e4;border-radius:16px;font-family:Inter;font-size:15px;outline:none;background:#fff}}
.input:focus{{border-color:#ff5f6d;box-shadow:0 0 0 3px rgba(255,95,109,.12)}}
label{{display:block;font-size:12px;font-weight:600;color:#64748b;margin-bottom:4px;letter-spacing:.03em;text-transform:uppercase}}
.nav-dots{{display:flex;justify-content:center;gap:8px;padding:16px 20px 24px}}
.dot{{width:8px;height:8px;border-radius:50%;background:#e1e3e4}}
.dot.active{{background:#ff5f6d;width:24px;border-radius:4px}}
</style></head><body>
<div class="phone">

<div class="p20"><h2 style="font-size:20px">Discovery Preferences</h2></div>
<div style="height:4px;background:#e1e3e4;margin:0 20px;border-radius:2px;position:relative"><div style="position:absolute;left:0;top:0;height:100%;width:100%;background:linear-gradient(90deg,#ff5f6d,#ff8a6d);border-radius:2px"></div></div>
<div class="p20">
<p style="font-size:13px;color:#64748b;margin-bottom:20px">Set your preferences so we can find the right people for you.</p>
<div class="mb16">
<label>Show me</label>
<div style="display:flex;gap:8px;margin-top:4px">
<div style="flex:1;padding:10px;text-align:center;border-radius:999px;border:1.5px solid #ff5f6d;background:#fff5f5;color:#ff5f6d;font-weight:500;cursor:pointer">Women</div>
<div style="flex:1;padding:10px;text-align:center;border-radius:999px;border:1.5px solid #e1e3e4;background:#fff;color:#64748b;font-weight:500;cursor:pointer">Men</div>
<div style="flex:1;padding:10px;text-align:center;border-radius:999px;border:1.5px solid #e1e3e4;background:#fff;color:#64748b;font-weight:500;cursor:pointer">Everyone</div>
</div>
</div>
<div class="mb16">
<label>Age range</label>
<div style="display:flex;align-items:center;gap:12px;margin-top:8px">
<input type="range" min="18" max="80" value="22" style="flex:1;accent-color:#ff5f6d">
<input type="range" min="18" max="80" value="40" style="flex:1;accent-color:#ff5f6d">
</div>
<div style="display:flex;justify-content:space-between;font-size:13px;color:#64748b;margin-top:4px">
<span>22</span><span>years</span><span>40</span>
</div>
</div>
<div class="mb16">
<label>Maximum distance</label>
<div style="display:flex;align-items:center;gap:12px;margin-top:8px">
<input type="range" min="1" max="200" value="50" style="flex:1;accent-color:#ff5f6d">
<span style="font-size:14px;font-weight:600;color:#1a1c2e;min-width:40px">50 km</span>
</div>
</div>
<a class="btn" href="#" style="margin-top:24px">Start Exploring</a>
<p style="text-align:center;font-size:12px;color:#94a3b8;margin-top:12px">You can change these anytime in Settings</p>
</div>

</div></body></html>
