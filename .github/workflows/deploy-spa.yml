name: Build and Deploy SPA

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "vite.config.ts"
      - ".github/workflows/deploy-spa.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build SPA
        run: VITE_API_URL="" npm run build
        env:
          CI: false

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 91.107.206.65 >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          rsync -rlgoDzvc -i --delete dist/ root@91.107.206.65:/srv/vynce/vynce-mobile/dist/
